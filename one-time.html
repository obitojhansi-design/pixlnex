<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixlnex · Moments</title>
  <link rel="icon" href="logo.png" type="image/png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    body { background: #f0f4f8; color: #0b1a2e; line-height: 1.5; min-height: 100vh; display: flex; flex-direction: column; }
    .app { max-width: 1300px; margin: 0 auto; padding: 1.5rem 2rem; flex: 1; width: 100%; }

    .navbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1.5rem; padding: 0.75rem 0 1.5rem 0; border-bottom: 1px solid #e2e8f0; margin-bottom: 2rem; }
    .logo { display: flex; align-items: center; gap: 0.5rem; font-size: 1.8rem; font-weight: 700; color: #0f2b4b; text-decoration: none; }
    .logo img { height: 35px; width: auto; }
    .logo i { color: #2563eb; font-size: 2rem; }
    .nav-links { display: flex; align-items: center; gap: 2rem; font-weight: 500; flex-wrap: wrap; }
    .nav-links a { text-decoration: none; color: #1e293b; font-size: 1rem; transition: color 0.2s; cursor: pointer; }
    .nav-links a:hover, .nav-links a.active { color: #2563eb; }
    .auth-btn { background: #0f2b4b; color: white !important; padding: 0.5rem 1.2rem; border-radius: 40px; font-weight: 600; transition: 0.2s; }
    .auth-btn:hover { background: #1a3a5e; }
    .auth-btn.logout { background: #eef2f6; color: #1e293b !important; }
    .auth-btn.logout:hover { background: #fee2e2; color: #b91c1c !important; }
    .cart-icon { font-size: 1.4rem; background: #eef2f6; padding: 0.5rem 0.9rem; border-radius: 40px; display: flex; align-items: center; gap: 0.4rem; text-decoration: none; color: #0b1a2e; }
    .cart-count { background: #2563eb; color: white; font-size: 0.75rem; font-weight: 600; padding: 0.15rem 0.55rem; border-radius: 30px; margin-left: 0.2rem; }

    .page-header { background: linear-gradient(145deg, #7c3aed, #6d28d9); padding: 2.5rem 3rem; border-radius: 2.5rem; margin-bottom: 2.8rem; color: white; }
    .page-header h1 { font-size: 2.8rem; font-weight: 700; }
    .page-header p { opacity: 0.9; font-size: 1.1rem; max-width: 600px; margin-top: 0.3rem; }
    .page-header .badge { display: inline-block; background: rgba(255,255,255,0.2); padding: 0.2rem 1rem; border-radius: 40px; font-size: 0.8rem; margin-top: 0.5rem; border: 1px solid rgba(255,255,255,0.15); }
    .page-header .stats { display: inline-block; background: rgba(255,255,255,0.15); padding: 0.2rem 1rem; border-radius: 40px; font-size: 0.8rem; margin-top: 0.5rem; margin-left: 0.5rem; border: 1px solid rgba(255,255,255,0.1); }

    .filter-bar { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem; padding: 1rem 0; }
    .filter-bar input { padding: 0.7rem 1.2rem; border-radius: 60px; border: 1px solid #e2e8f0; flex: 1; min-width: 200px; font-size: 0.95rem; background: white; transition: 0.2s; }
    .filter-bar input:focus { outline: none; border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
    .filter-bar select { padding: 0.7rem 1.2rem; border-radius: 60px; border: 1px solid #e2e8f0; background: white; font-size: 0.95rem; cursor: pointer; }

    .moments-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; margin-bottom: 3rem; }
    .moment-card { background: white; border-radius: 2rem; overflow: hidden; border: 1px solid #e9eef3; transition: all 0.3s ease; }
    .moment-card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px -8px rgba(0,20,40,0.1); border-color: #d9e2ef; }

    .moment-card .moment-preview { position: relative; width: 100%; aspect-ratio: 16/9; background: #1e293b; overflow: hidden; cursor: pointer; }
    .moment-card .moment-preview iframe { width: 100%; height: 100%; border: none; pointer-events: none; }
    .moment-card .moment-preview .play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; }
    .moment-card .moment-preview:hover .play-overlay { opacity: 1; }
    .moment-card .moment-preview .play-overlay i { font-size: 3rem; color: white; background: rgba(255,255,255,0.2); width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); border: 2px solid rgba(255,255,255,0.3); }
    .moment-card .moment-preview .demo-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.7); color: white; font-size: 0.65rem; padding: 0.2rem 0.8rem; border-radius: 30px; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.1); }
    .moment-card .moment-preview .used-badge { position: absolute; top: 12px; left: 12px; background: #ef4444; color: white; font-size: 0.65rem; padding: 0.2rem 0.8rem; border-radius: 30px; font-weight: 600; }
    .moment-card .moment-preview .view-count { position: absolute; bottom: 12px; right: 12px; background: rgba(0,0,0,0.6); color: white; font-size: 0.7rem; padding: 0.2rem 0.8rem; border-radius: 30px; backdrop-filter: blur(4px); }

    .moment-card .moment-info { padding: 1.5rem; }
    .moment-card .moment-info .moment-type { font-size: 0.7rem; color: #7c3aed; background: #7c3aed10; padding: 0.15rem 0.8rem; border-radius: 30px; display: inline-block; margin-bottom: 0.5rem; border: 1px solid #7c3aed20; }
    .moment-card .moment-info h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.2rem; }
    .moment-card .moment-info .moment-title { font-size: 0.95rem; color: #64748b; margin-bottom: 0.5rem; }
    .moment-card .moment-info .moment-desc { font-size: 0.9rem; color: #475569; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .moment-card .moment-info .moment-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #f1f5f9; }
    .moment-card .moment-info .moment-footer .btn-preview { background: #0f2b4b; color: white; border: none; padding: 0.4rem 1.2rem; border-radius: 40px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; }
    .moment-card .moment-info .moment-footer .btn-preview:hover { background: #1a3a5e; transform: scale(1.02); }
    .moment-card .moment-info .moment-footer .btn-preview:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .moment-card .moment-info .moment-footer .share-link { font-size: 0.8rem; color: #94a3b8; cursor: pointer; transition: 0.2s; }
    .moment-card .moment-info .moment-footer .share-link:hover { color: #7c3aed; }

    .empty-state { text-align: center; padding: 4rem 2rem; grid-column: 1 / -1; }
    .empty-state i { font-size: 4rem; color: #7c3aed; margin-bottom: 1rem; display: block; opacity: 0.5; }
    .empty-state h3 { font-size: 1.5rem; color: #0b1a2e; margin-bottom: 0.5rem; }
    .empty-state p { color: #94a3b8; max-width: 400px; margin: 0 auto; }

    .footer { margin-top: 4rem; border-top: 1px solid #e2e8f0; padding: 2rem 0 1rem 0; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1rem; color: #475569; font-size: 0.9rem; }
    .footer i { color: #2563eb; margin: 0 0.2rem; }

    .toast { position: fixed; bottom: 2rem; right: 2rem; background: #0f2b4b; color: white; padding: 1rem 1.8rem; border-radius: 60px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); font-weight: 600; display: flex; align-items: center; gap: 0.7rem; transform: translateY(100px); opacity: 0; transition: all 0.4s ease; z-index: 100000; max-width: 90%; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast i { color: #22c55e; font-size: 1.2rem; }
    .toast.error { background: #b91c1c; }
    .toast.error i { color: #fee2e2; }

    .loading-spinner { display: inline-block; width: 40px; height: 40px; border: 3px solid #eef2f6; border-radius: 50%; border-top-color: #7c3aed; animation: spin 0.8s linear infinite; margin: 2rem auto; grid-column: 1 / -1; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Demo Overlay */
    .demo-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 99999; align-items: center; justify-content: center; padding: 2rem; }
    .demo-overlay.active { display: flex; }
    .demo-overlay .demo-content { position: relative; width: 100%; max-width: 1200px; height: 85vh; background: white; border-radius: 1.5rem; overflow: hidden; }
    .demo-overlay .demo-content iframe { width: 100%; height: 100%; border: none; }
    .demo-overlay .demo-close { position: absolute; top: 16px; right: 20px; color: white; font-size: 2rem; cursor: pointer; background: rgba(0,0,0,0.7); border: none; width: 48px; height: 48px; border-radius: 50%; z-index: 10; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
    .demo-overlay .demo-close:hover { background: rgba(0,0,0,0.9); transform: scale(1.1); }
    .demo-overlay .demo-label { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); color: white; background: rgba(0,0,0,0.6); padding: 0.3rem 1.2rem; border-radius: 30px; font-size: 0.8rem; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.1); z-index: 10; }

    @media (max-width: 700px) {
      .app { padding: 1rem; }
      .navbar { flex-direction: column; align-items: stretch; }
      .nav-links { justify-content: space-between; }
      .page-header { padding: 1.8rem; }
      .page-header h1 { font-size: 2rem; }
      .moments-grid { grid-template-columns: 1fr; }
      .demo-overlay .demo-content { height: 60vh; }
      .moment-card .moment-preview { aspect-ratio: 4/3; }
    }
  </style>
</head>
<body>

<div class="app">
  <header class="navbar">
    <a href="index.html" class="logo"><img src="logo.png" alt="Pixlnex" /><span>Pixlnex</span></a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="shop.html">Webs</a>
      <a href="one-time.html" class="active">✨ Moments</a>
      <a href="#" id="navAbout">About</a>
      <a href="profile.html" id="authBtn" class="auth-btn"><i class="fas fa-user"></i> Login</a>
      <a href="shop.html" class="cart-icon"><i class="fas fa-shopping-bag"></i><span class="cart-count" id="cartCounter">0</span></a>
    </nav>
  </header>

  <div class="toast" id="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg">Done!</span></div>

  <!-- DEMO OVERLAY -->
  <div class="demo-overlay" id="demoOverlay">
    <div class="demo-content">
      <button class="demo-close" onclick="closeDemo()">&times;</button>
      <div class="demo-label">▶️ Live Demo</div>
      <iframe id="demoIframe" src=""></iframe>
    </div>
  </div>

  <div class="page-header">
    <div>
      <span class="badge">✨ Pixlnex Moments</span>
      <h1>One-Time Use Websites</h1>
      <p>Discover unique, one-time use websites created for special moments. Each one is a special experience.</p>
      <span class="stats" id="momentCount">0 moments</span>
    </div>
  </div>

  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="🔍 Search moments...">
    <select id="genreFilter">
      <option value="all">All Genres</option>
      <option value="prank">😂 Prank</option>
      <option value="proposal">💍 Proposal</option>
      <option value="birthday">🎂 Birthday Wish</option>
      <option value="love">❤️ Love Letter</option>
      <option value="apology">🙏 Apology</option>
      <option value="encouragement">💪 Encouragement</option>
      <option value="friendship">🤝 Friendship</option>
      <option value="custom">🎨 Custom</option>
    </select>
  </div>

  <div class="moments-grid" id="momentsGrid">
    <div class="loading-spinner"></div>
  </div>

  <footer class="footer">
    <span>© 2026 Pixlnex — <i class="fas fa-spider"></i> one person · one website at a time</span>
    <span><i class="fab fa-twitter"></i> <i class="fab fa-github"></i> <i class="fab fa-linkedin"></i></span>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============================================
// PIXLNEX - MOMENTS PAGE
// ============================================

 const SUPABASE_URL = 'https://skdthncgjwtlydtgtjze.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_k1DV8-nVcr4o5LE8s_wbLA_O7BPQFpy';

let supabaseClient = null;
let supabaseConnected = false;
let allMoments = [];
let currentUser = null;

function initSupabase() {
  try {
    if (typeof supabase !== 'undefined') {
      supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      supabaseConnected = true;
      console.log('✅ Supabase connected (Moments)');
      return true;
    }
    return false;
  } catch(e) {
    console.error('Supabase error:', e);
    return false;
  }
}

async function getCurrentUser() {
  if (!supabaseConnected || !supabaseClient) return null;
  try {
    const { data: sessionData } = await supabaseClient.auth.getSession();
    if (!sessionData.session) {
      const storedUser = localStorage.getItem('pixlnex_user_secure');
      if (storedUser) {
        try {
          const userData = JSON.parse(storedUser);
          if (userData._sig === btoa(userData.id + userData.email + 'pixlnex_secret_salt')) {
            return {
              id: userData.id,
              email: userData.email,
              user_metadata: { full_name: userData.name },
              created_at: userData.created_at
            };
          }
        } catch(e) {}
      }
      return null;
    }
    const { data, error } = await supabaseClient.auth.getUser();
    if (error) throw error;
    if (data.user) {
      const userData = {
        id: data.user.id,
        email: data.user.email,
        name: data.user.user_metadata?.full_name || data.user.email?.split('@')[0],
        created_at: data.user.created_at,
        _sig: btoa(data.user.id + data.user.email + 'pixlnex_secret_salt')
      };
      localStorage.setItem('pixlnex_user_secure', JSON.stringify(userData));
    }
    return data.user;
  } catch(e) { return null; }
}

async function getMoments() {
  if (!supabaseConnected || !supabaseClient) return [];
  try {
    const { data, error } = await supabaseClient.from('one_time_items').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    return data || [];
  } catch(e) { 
    console.error('Moments fetch error:', e);
    return []; 
  }
}

function waitForSupabase() {
  return new Promise((resolve) => {
    let attempts = 0;
    const check = () => {
      if (supabaseConnected && supabaseClient) { resolve(true); return; }
      attempts++;
      if (attempts > 30) { resolve(false); return; }
      setTimeout(check, 300);
    };
    if (!supabaseConnected) { initSupabase(); }
    check();
  });
}

let toastTimer;

function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  toast.className = 'toast ' + type + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toast.classList.remove('show');
    toast.className = 'toast';
  }, 4000);
}

function openDemo(url) {
  if (!url) {
    showToast('⚠️ No demo URL available', 'error');
    return;
  }
  const overlay = document.getElementById('demoOverlay');
  const iframe = document.getElementById('demoIframe');
  iframe.src = url;
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeDemo() {
  const overlay = document.getElementById('demoOverlay');
  const iframe = document.getElementById('demoIframe');
  iframe.src = '';
  overlay.classList.remove('active');
  document.body.style.overflow = '';
}

function copyToClipboard(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      showToast('✅ Link copied to clipboard!');
    }).catch(() => {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy');
    showToast('✅ Link copied to clipboard!');
  } catch(e) {
    showToast('⚠️ Could not copy. Please copy manually.', 'error');
  }
  document.body.removeChild(textarea);
}

function renderMoments(moments) {
  const grid = document.getElementById('momentsGrid');
  
  if (!moments || moments.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-wand-magic-sparkles"></i>
        <h3>No Moments Yet</h3>
        <p>Be the first to create a Pixlnex Moment! Each one is a unique, one-time use website.</p>
      </div>
    `;
    document.getElementById('momentCount').textContent = '0 moments';
    return;
  }

  document.getElementById('momentCount').textContent = `${moments.length} moment${moments.length > 1 ? 's' : ''}`;
  grid.innerHTML = '';

  const typeIcons = {
    'prank': '😂', 'proposal': '💍', 'birthday': '🎂', 'custom': '🎨',
    'love': '❤️', 'apology': '🙏', 'encouragement': '💪', 'friendship': '🤝'
  };
  const typeLabels = {
    'prank': 'Prank', 'proposal': 'Proposal', 'birthday': 'Birthday Wish',
    'custom': 'Custom', 'love': 'Love Letter', 'apology': 'Apology',
    'encouragement': 'Encouragement', 'friendship': 'Friendship'
  };

  moments.forEach((m, index) => {
    const card = document.createElement('div');
    card.className = 'moment-card';
    const icon = typeIcons[m.type] || '🎨';
    const typeLabel = typeLabels[m.type] || m.type || 'Custom';
    const isUsed = m.used || false;
    const shareUrl = `${window.location.origin}/view.html?slug=${m.slug}`;
    const hasDemo = m.demo_url && m.demo_url.trim() !== '';
    const demoUrl = hasDemo ? m.demo_url : shareUrl;
    
    card.innerHTML = `
      <div class="moment-preview" onclick="${hasDemo ? `openDemo('${demoUrl}')` : `window.open('${shareUrl}','_blank')`}">
        <iframe src="${hasDemo ? demoUrl : 'about:blank'}" loading="lazy" allow="fullscreen"></iframe>
        <div class="play-overlay">
          <i class="fas fa-play"></i>
        </div>
        ${isUsed ? '<span class="used-badge">🔒 Used</span>' : ''}
        ${hasDemo ? '<span class="demo-badge">▶️ Live</span>' : ''}
        <span class="view-count"><i class="fas fa-eye"></i> ${m.views || 0}</span>
      </div>
      <div class="moment-info">
        <span class="moment-type">${icon} ${typeLabel}</span>
        <h3>${m.website_name || m.title || 'Untitled'}</h3>
        ${m.title ? `<div class="moment-title">${m.title}</div>` : ''}
        ${m.description ? `<div class="moment-desc">${m.description}</div>` : ''}
        <div class="moment-footer">
          <button class="btn-preview" onclick="${hasDemo ? `openDemo('${demoUrl}')` : `window.open('${shareUrl}','_blank')`}">
            <i class="fas fa-eye"></i> ${hasDemo ? 'Live Demo' : 'View'}
          </button>
          <span class="share-link" onclick="copyToClipboard('${shareUrl}')">
            <i class="fas fa-link"></i> Copy Link
          </span>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function filterMoments() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
  const genreFilter = document.getElementById('genreFilter').value;
  
  let filtered = allMoments;
  
  if (searchTerm) {
    filtered = filtered.filter(m => 
      (m.website_name || '').toLowerCase().includes(searchTerm) ||
      (m.title || '').toLowerCase().includes(searchTerm) ||
      (m.description || '').toLowerCase().includes(searchTerm)
    );
  }
  
  if (genreFilter !== 'all') {
    filtered = filtered.filter(m => m.type === genreFilter);
  }
  
  renderMoments(filtered);
}

async function updateAuthUI() {
  try {
    currentUser = await getCurrentUser();
  } catch(e) { 
    currentUser = null; 
  }
  const authBtn = document.getElementById('authBtn');
  if (currentUser) {
    const name = currentUser.user_metadata?.full_name || currentUser.email?.split('@')[0] || 'User';
    authBtn.innerHTML = `<i class="fas fa-user-check"></i> ${name}`;
    authBtn.className = 'auth-btn logout';
    authBtn.href = 'profile.html';
    authBtn.onclick = null;
  } else {
    authBtn.innerHTML = '<i class="fas fa-user"></i> Login';
    authBtn.className = 'auth-btn';
    authBtn.href = 'login.html';
    authBtn.onclick = null;
  }
}

document.getElementById('searchInput').addEventListener('input', filterMoments);
document.getElementById('genreFilter').addEventListener('change', filterMoments);

document.getElementById('navAbout').addEventListener('click', function(e) {
  e.preventDefault();
  alert('📖 About Pixlnex Moments\n\nPixlnex Moments are special one-time use websites created for unique experiences.\n\n✨ Each moment is a unique website\n🎯 One-time use only\n🌟 Perfect for special occasions\n🔗 Share with anyone');
});

(async function() {
  console.log('🚀 Moments page loading...');
  
  const connected = await waitForSupabase();
  if (!connected) {
    document.getElementById('toastMsg').textContent = '⚠️ Database not connected. Please refresh.';
    document.getElementById('toast').classList.add('show');
    return;
  }

  await updateAuthUI();

  try {
    allMoments = await getMoments();
    console.log('✅ Moments loaded:', allMoments.length);
  } catch(e) {
    console.error('Error loading moments:', e);
    showToast('⚠️ Error loading moments', 'error');
    return;
  }

  renderMoments(allMoments);
  
  // Cart counter
  const cart = JSON.parse(localStorage.getItem('pixlnex_cart') || '[]');
  document.getElementById('cartCounter').textContent = cart.reduce((sum, item) => sum + (item.quantity || 0), 0);
  
  console.log('✅ Moments page initialized!');
})();

// ─── DEMO OVERLAY KEYBOARD SUPPORT ───
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeDemo();
  }
});
</script>
</body>
</html>
